<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background-color: #F0F4F8;
        font-family: 'Inter', sans-serif;
        color: #334E68;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 100px;
        position: relative;
        overflow: hidden;
      }
      .accent-block {
        position: absolute;
        right: 0;
        top: 0;
        width: 400px;
        height: 100%;
        background-color: #D64545;
      }
      .title {
        font-weight: 900;
        font-size: 80px;
        color: #102A43;
        line-height: 1.1;
        margin-bottom: 20px;
        text-transform: uppercase;
        max-width: 700px;
      }
      .subtitle {
        font-weight: 500;
        font-size: 32px;
        color: #334E68;
        margin-bottom: 40px;
      }
      .presenter {
        font-weight: 400;
        font-size: 24px;
        color: #102A43;
        display: flex;
        align-items: center;
      }
      .marker {
        width: 8px;
        height: 8px;
        background-color: #D64545;
        margin-right: 15px;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="accent-block"></div>
        <h1 class="title">Pathshala ERP</h1>
        <p class="subtitle">Empowering Academic Excellence through Technology</p>
        <div class="presenter">
            <div class="marker"></div>
            <span>Presented by Manus AI</span>
        </div>
    </div>
</body>
</html>
