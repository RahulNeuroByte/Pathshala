<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; }
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background-color: #F0F4F8;
        font-family: 'Inter', sans-serif;
        color: #334E68;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .accent-block {
        width: 120px;
        height: 120px;
        background-color: #D64545;
        position: absolute;
        top: 0;
        right: 0;
      }
      .bottom-block {
        width: 100%;
        height: 40px;
        background-color: #102A43;
        position: absolute;
        bottom: 0;
        left: 0;
      }
      .title {
        font-weight: 900;
        font-size: 120px;
        color: #102A43;
        text-transform: uppercase;
        margin: 0;
        line-height: 1;
      }
      .subtitle {
        font-weight: 500;
        font-size: 32px;
        color: #334E68;
        margin-top: 20px;
        margin-bottom: 40px;
      }
      .closing-remark {
        display: flex;
        align-items: center;
        font-weight: 400;
        font-size: 24px;
        color: #102A43;
      }
      .marker {
        width: 8px;
        height: 8px;
        background-color: #D64545;
        margin-right: 15px;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="accent-block"></div>
        <h1 class="title">Q&A</h1>
        <p class="subtitle">Thank you for your time!</p>
        <div class="closing-remark">
            <div class="marker"></div>
            <span>Any questions?</span>
        </div>
        <div class="bottom-block"></div>
    </div>
</body>
</html>
